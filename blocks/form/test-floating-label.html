<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Floating Label Test</title>
  <link rel="stylesheet" href="form.css">
  <style>
    body {
      background: #f0f4f8;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
    }
    .form {
      position: relative !important;
      margin-top: 0 !important;
      z-index: auto;
    }
  </style>
</head>
<body>
  <div class="form">
    <form class="weekly-report-form" novalidate>

      <!-- Simple text field -->
      <div class="form-row" style="margin-top:10px">
        <label for="project">Project</label>
        <div class="form-control-wrap">
          <input type="text" id="project" name="project" placeholder="Enter project">
          <div class="field-error" hidden></div>
        </div>
      </div>

      <!-- Pair row: Email + Hours Saved -->
      <div class="form-row form-row-pair">
        <div class="form-row form-row-searchable">
          <label for="email-address">Email</label>
          <div class="searchable-select-wrap">
            <input type="text" id="email-address" name="email-address" placeholder="Search and select email">
          </div>
          <div class="field-error" hidden></div>
        </div>
        <div class="form-row">
          <label for="hours-saved">Hours Saved</label>
          <div class="form-control-wrap">
            <input type="number" id="hours-saved" name="hours-saved" placeholder="Enter hours saved" step="0.1" min="0">
            <div class="field-error" hidden></div>
          </div>
        </div>
      </div>

      <!-- Date range row -->
      <div class="form-row form-row-dates">
        <div class="form-date-field">
          <label for="from-date">From Date</label>
          <div class="form-control-wrap">
            <div class="cdp-display" role="button" tabindex="0" id="from-date">
              <span class="cdp-display-text cdp-placeholder">dd/mm/yyyy</span>
              <span class="cdp-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
            </div>
            <div class="field-error" hidden></div>
          </div>
        </div>
        <div class="form-date-field">
          <label for="to-date">To Date</label>
          <div class="form-control-wrap">
            <div class="cdp-display" role="button" tabindex="0" id="to-date">
              <span class="cdp-display-text cdp-placeholder">dd/mm/yyyy</span>
              <span class="cdp-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
            </div>
            <div class="field-error" hidden></div>
          </div>
        </div>
      </div>

      <!-- Accelerator Used (AU) -->
      <div class="form-row form-row-au">
        <label for="accelerator-used-search">Accelerator Used</label>
        <div class="au-shell" style="margin-top:10px">
          <div class="au-header">
            <div class="au-title-group">
              <div class="au-subtitle">Select one or more</div>
            </div>
            <button type="button" class="au-clear-all" style="display:none">Clear all</button>
          </div>
          <div class="au-search-wrap">
            <span class="au-search-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" id="accelerator-used-search" class="au-search-input" placeholder="Search or select accelerators">
            <button type="button" class="au-chevron-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        </div>
        <div class="field-error" hidden></div>
      </div>

      <!-- Submit -->
      <div class="form-row form-row-submit">
        <button type="button">Submit Weekly Report</button>
      </div>

    </form>
  </div>
</body>
</html>
